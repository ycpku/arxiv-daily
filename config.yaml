# Global settings
max_results: 250
lookback_hours: 30

# Category-based rules. Each rule is matched and ranked independently.
category_rules:
  - name: Contact Simulation
    categories:
      - cs.GR
      - cs.CV
      - cs.AI
      - cs.LG
      - cs.HC
      - cs.PF
      - cs.NA
      - cs.RO
      - math.NA
    keywords_any:
      - contact
      - collision
      - self-collision
      - collision detection
      - collision response
      - physics-based
    keywords_all: []
    # any: keyword OR author match, all: keyword AND author match
    match_mode: any
    # Optional author filter inside this category rule
    authors_any: []
    max_papers: 30
    query_max_results: 250

  - name: Simulation General
    categories:
      - cs.GR
      - cs.CV
      - cs.AI
      - cs.LG
      - cs.HC
      - cs.PF
      - cs.NA
      - math.NA
    keywords_any:
      - cloth
      - hair
      - soft body
      - deformable
      - fracture
      - elastic
      - plasticity
      - constitutive model
      - finite element
      - rigid body
      - fem
      - mpm
      - pbd
      - abd
      - physics-based
      - elastodynamics
      - fluid dynamics
      - differentiable simulation
      - inverse simulation
    keywords_all: []
    # any: keyword OR author match, all: keyword AND author match
    match_mode: any
    # Optional author filter inside this category rule
    authors_any: []
    max_papers: 30
    query_max_results: 250

  - name: Simulation Ready
    categories:
      - cs.CV
      - cs.RO
      - cs.GR
      - cs.AI
      - cs.LG
      - cs.HC
    keywords_any:
      - simulation ready
      - sim-ready
      - articulated
      - VLM
    keywords_all: []
    # any: keyword OR author match, all: keyword AND author match
    match_mode: any
    # Optional author filter inside this category rule
    authors_any: []
    max_papers: 20
    query_max_results: 250

# Extra section: latest papers from followed authors
authors_watchlist:
  authors:
    - Minchen Li
    - Taku Komura
    - Yin Yang
    - Peter Yichen Chen
    - Chenfanfu Jiang
    - Eitan Grinspun
    - Tiantian Liu
    - Yuanming Hu
    - Daniele Panozzo
    - Denis Zorin
    - Bo Zhu
    - Kemeng Huang
    - Albert Chern
    - Martin Fischer
    - Hao Su
    - Keenan Crane
  max_papers_per_author: 5
  query_max_results: 10
  lookback_hours: 24
